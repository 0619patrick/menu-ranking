services:
  - type: web
    name: menu-ranking
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 300 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
